name: Playwright Validation

on:
  workflow_dispatch:
    inputs:
      test_files:
        description: Playwright test file(s) to execute
        required: false
        default: ""
      validation_branch:
        description: Validation branch to checkout
        required: false
        default: ""
      validation_mode:
        description: "Validation mode: quick, impact, or full"
        required: false
        default: "impact"
      browser:
        description: Browser to run Playwright validation
        required: false
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
  push:
    branches:
      - "aiqa/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_TEST_FILES: ${{ github.event.inputs.test_files || '' }}
      VALIDATION_MODE: ${{ github.event.inputs.validation_mode || 'impact' }}
      BROWSER: ${{ github.event.inputs.browser || 'chromium' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.validation_branch || github.ref }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install "$BROWSER" --with-deps

      - name: Print BASE_URL diagnostics
        run: |
          echo "BASE_URL=$BASE_URL"
          node -e "console.log('BASE_URL:', process.env.BASE_URL)"

          node <<'NODE'
          const fs = require('fs');

          const config = fs.readFileSync('playwright.config.ts', 'utf8');
          const fallbackMatch = config.match(/baseURL:\s*process\.env\.BASE_URL\s*(?:\|\||\?\?)\s*['"`]([^'"`]+)['"`]/);
          const resolvedBaseURL = process.env.BASE_URL || fallbackMatch?.[1] || '';

          console.log('Playwright resolved baseURL:', resolvedBaseURL);
          NODE

          echo "Validation mode: $VALIDATION_MODE"
          if [ "$VALIDATION_MODE" = "full" ]; then
            echo "Playwright command: npx playwright test --project=$BROWSER --reporter=json,html --workers=1"
          elif [ -n "$PLAYWRIGHT_TEST_FILES" ]; then
            echo "Playwright command: npx playwright test $PLAYWRIGHT_TEST_FILES --project=$BROWSER --reporter=json,html --workers=1"
          else
            echo "Playwright command: no test files provided for incremental validation"
          fi

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_TEST_FILES: ${{ github.event.inputs.test_files }}
          VALIDATION_MODE: ${{ github.event.inputs.validation_mode || 'impact' }}
          BROWSER: ${{ github.event.inputs.browser || 'chromium' }}
        run: |
          if [ "$VALIDATION_MODE" = "full" ]; then
            npx playwright test --project=$BROWSER --reporter=json,html --workers=1
          elif [ -n "$PLAYWRIGHT_TEST_FILES" ]; then
            npx playwright test $PLAYWRIGHT_TEST_FILES --project=$BROWSER --reporter=json,html --workers=1
          else
            echo "No test files provided for incremental validation."
            exit 1
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
