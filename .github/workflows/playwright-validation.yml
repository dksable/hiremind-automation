name: Playwright Validation

on:
  workflow_dispatch:
    inputs:
      test_files:
        description: Playwright test file(s) to execute
        required: false
        default: ""
      validation_branch:
        description: Validation branch to checkout
        required: false
        default: ""
  push:
    branches:
      - "aiqa/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.validation_branch || github.ref }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          if [ -n "${{ github.event.inputs.test_files }}" ]; then
            npx playwright test ${{ github.event.inputs.test_files }} --reporter=json,html --workers=1
          else
            npx playwright test --reporter=json,html --workers=1
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
